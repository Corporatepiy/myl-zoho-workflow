<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SATYA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@100;300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      background: #060606;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    svg { overflow: visible; }

    /* ── Ring ── */
    .ring {
      transform-origin: 50% 50%;
      transform: rotate(-90deg);
      stroke-dasharray: 628.32;
      stroke-dashoffset: 628.32;
      animation: drawRing 1.6s cubic-bezier(0.6, 0, 0.3, 1) 0.3s forwards;
    }
    @keyframes drawRing { to { stroke-dashoffset: 0; } }

    .ring-inner {
      opacity: 0;
      animation: fadeInSoft 1.2s ease 2.0s forwards;
    }
    @keyframes fadeInSoft { to { opacity: 0.2; } }

    /* ── Glow pulse ── */
    .ring-glow {
      opacity: 0;
      filter: blur(8px);
      animation: glowPulse 3.6s ease-in-out 2.8s infinite;
    }
    @keyframes glowPulse {
      0%, 100% { opacity: 0;    }
      50%       { opacity: 0.18; }
    }

    /* ── Compass dots ── */
    .dot { opacity: 0; animation: dotPop 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
    .d-n { animation-delay: 2.0s; }
    .d-e { animation-delay: 2.1s; }
    .d-s { animation-delay: 2.2s; }
    .d-w { animation-delay: 2.3s; }
    @keyframes dotPop {
      from { opacity: 0; transform: scale(0); }
      to   { opacity: 1; transform: scale(1); }
    }

    /* ── Letters ── */
    .ltr {
      opacity: 0;
      animation: letterRise 0.65s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }
    .l1 { animation-delay: 1.1s;  }
    .l2 { animation-delay: 1.27s; }
    .l3 { animation-delay: 1.44s; }
    .l4 { animation-delay: 1.61s; }
    .l5 { animation-delay: 1.78s; }
    @keyframes letterRise {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0);    }
    }

    /* ── Underline ── */
    .uline {
      stroke-dasharray: 148;
      stroke-dashoffset: 148;
      animation: drawLine 0.55s cubic-bezier(0.4, 0, 0.2, 1) 2.2s forwards;
    }
    @keyframes drawLine { to { stroke-dashoffset: 0; } }

    /* ── Tag line ── */
    .tagline {
      opacity: 0;
      animation: fadeInSoft 0.8s ease 2.9s forwards;
    }
  </style>
</head>
<body>
  <svg width="480" height="480" viewBox="-200 -200 400 400" xmlns="http://www.w3.org/2000/svg">

    <!-- Glow halo behind ring -->
    <circle class="ring-glow"
            cx="0" cy="0" r="100"
            fill="none" stroke="#C8A84A" stroke-width="10"/>

    <!-- Inner ring -->
    <circle class="ring-inner"
            cx="0" cy="0" r="91"
            fill="none" stroke="#C8A84A" stroke-width="0.5"/>

    <!-- Main ring -->
    <circle class="ring"
            cx="0" cy="0" r="100"
            fill="none" stroke="#C8A84A" stroke-width="1.3"/>

    <!-- Compass dots -->
    <circle class="dot d-n" cx="0"    cy="-100" r="2.2" fill="#C8A84A" transform-origin="0 -100"/>
    <circle class="dot d-e" cx="100"  cy="0"    r="2.2" fill="#C8A84A" transform-origin="100 0"/>
    <circle class="dot d-s" cx="0"    cy="100"  r="2.2" fill="#C8A84A" transform-origin="0 100"/>
    <circle class="dot d-w" cx="-100" cy="0"    r="2.2" fill="#C8A84A" transform-origin="-100 0"/>

    <!-- Letters  S  A  T  Y  A  equally spaced, centered at y = -6 -->
    <text class="ltr l1"
          font-family="'Josefin Sans', 'Helvetica Neue', sans-serif"
          font-weight="300" font-size="48"
          fill="#FFFFFF" text-anchor="middle" dominant-baseline="central"
          x="-88" y="-6">S</text>

    <text class="ltr l2"
          font-family="'Josefin Sans', 'Helvetica Neue', sans-serif"
          font-weight="300" font-size="48"
          fill="#FFFFFF" text-anchor="middle" dominant-baseline="central"
          x="-44" y="-6">A</text>

    <text class="ltr l3"
          font-family="'Josefin Sans', 'Helvetica Neue', sans-serif"
          font-weight="300" font-size="48"
          fill="#FFFFFF" text-anchor="middle" dominant-baseline="central"
          x="0" y="-6">T</text>

    <text class="ltr l4"
          font-family="'Josefin Sans', 'Helvetica Neue', sans-serif"
          font-weight="300" font-size="48"
          fill="#FFFFFF" text-anchor="middle" dominant-baseline="central"
          x="44" y="-6">Y</text>

    <text class="ltr l5"
          font-family="'Josefin Sans', 'Helvetica Neue', sans-serif"
          font-weight="300" font-size="48"
          fill="#FFFFFF" text-anchor="middle" dominant-baseline="central"
          x="88" y="-6">A</text>

    <!-- Gold underline below letters -->
    <line class="uline" x1="-74" y1="24" x2="74" y2="24"
          stroke="#C8A84A" stroke-width="0.9"/>

    <!-- Tagline -->
    <text class="tagline"
          font-family="'Josefin Sans', 'Helvetica Neue', sans-serif"
          font-weight="100" font-size="11"
          fill="#C8A84A" text-anchor="middle" letter-spacing="5"
          x="0" y="44">TRUTH IN EVERY THREAD</text>

  </svg>

  <script>
    // Replay on click
    document.body.addEventListener('click', () => location.reload());
  </script>
</body>
</html>
